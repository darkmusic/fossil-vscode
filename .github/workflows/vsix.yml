name: VSIX Package

on:
  workflow_dispatch:
  workflow_call:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 30
