name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm install --save-dev @vscode/test-electron

      - run: npm run check-types

      - run: npm run compile && node esbuild.js --production

      - name: Install Fossil
        run: sudo apt-get update && sudo apt-get install -y fossil

      - name: Open test repository
        run: cd src/test/test_repo && fossil open TestRepo.fossil -f

      - name: Download VS Code
        run: npx @vscode/test download --platform linux-x64

      - name: Run tests
        run: xvfb-run -a npm test
        env:
          VSCODE_EXECUTABLE_PATH: ${{ github.workspace }}/.vscode-test/vscode-linux-x64/code