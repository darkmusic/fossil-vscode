name: Release Recovery (retry publish)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/publish (example: v1.0.3)"
        required: true
        type: string
      publish_github_release_asset:
        description: "Upload VSIX to the GitHub Release if missing"
        required: true
        type: boolean
        default: true
      publish_marketplace:
        description: "Publish to VS Marketplace (retries; skip-duplicate)"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  recover:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ inputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Input tag ${{ inputs.tag }} (version $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm ci

      - run: npm run vsix

      - name: Resolve VSIX package
        id: vsix
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsix=( *.vsix )
          if [ ${#vsix[@]} -ne 1 ]; then
            echo "Expected exactly one VSIX package, found ${#vsix[@]}"
            printf '%s\n' "${vsix[@]}"
            exit 1
          fi
          echo "path=${vsix[0]}" >> "$GITHUB_OUTPUT"

      - name: Prepare GitHub Release asset
        if: ${{ inputs.publish_github_release_asset }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          VSIX="${{ steps.vsix.outputs.path }}"
          ASSET_NAME="$(basename "$VSIX")"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" "$VSIX" --title "$TAG" --generate-notes --verify-tag --draft
          else
            echo "Release $TAG already exists"

            if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fxq "$ASSET_NAME"; then
              echo "Asset $ASSET_NAME already on $TAG; skipping upload"
            elif [ "$(gh release view "$TAG" --json isImmutable --jq '.isImmutable')" = "true" ]; then
              echo "Release $TAG is immutable and missing $ASSET_NAME; create a new tag or recreate the release."
              exit 1
            else
              gh release upload "$TAG" "$VSIX"
            fi
          fi

          if ! gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fxq "$ASSET_NAME"; then
            echo "Asset $ASSET_NAME is missing from $TAG after upload"
            exit 1
          fi

      - name: Publish to Visual Studio Marketplace (retry)
        if: ${{ inputs.publish_marketplace }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          max_attempts=4
          retry_wait_seconds=90
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Marketplace publish attempt ${attempt}/${max_attempts}"
            if npx vsce publish --packagePath "${{ steps.vsix.outputs.path }}" --skip-duplicate --allow-proposed-apis timeline; then
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Publish failed; waiting ${retry_wait_seconds}s before retry..."
              sleep "$retry_wait_seconds"
            fi
          done
          echo "Marketplace publish failed after ${max_attempts} attempts"
          exit 1

      - name: Publish GitHub Release
        if: ${{ inputs.publish_github_release_asset }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"

          if [ "$(gh release view "$TAG" --json isDraft --jq '.isDraft')" = "true" ]; then
            gh release edit "$TAG" --draft=false
          else
            echo "Release $TAG is already published"
          fi
