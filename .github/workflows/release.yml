name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag ${GITHUB_REF_NAME} (version $TAG_VERSION) does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm ci

      - run: npm run vsix

      - name: Verify VSIX package
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsix=( *.vsix )
          if [ ${#vsix[@]} -ne 1 ]; then
            echo "Expected exactly one VSIX package, found ${#vsix[@]}"
            printf '%s\n' "${vsix[@]}"
            exit 1
          fi
          echo "Built ${vsix[0]}"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error

  github-release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Resolve VSIX package
        id: vsix
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsix=( *.vsix )
          if [ ${#vsix[@]} -ne 1 ]; then
            echo "Expected exactly one VSIX package, found ${#vsix[@]}"
            printf '%s\n' "${vsix[@]}"
            exit 1
          fi
          echo "path=${vsix[0]}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach VSIX
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VSIX="${{ steps.vsix.outputs.path }}"
          ASSET_NAME="$(basename "$VSIX")"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          else
            echo "Release $TAG already exists"
          fi

          if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fxq "$ASSET_NAME"; then
            echo "Asset $ASSET_NAME already on $TAG; skipping upload"
          else
            gh release upload "$TAG" "$VSIX"
          fi

          if ! gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fxq "$ASSET_NAME"; then
            echo "Asset $ASSET_NAME is missing from $TAG after upload"
            exit 1
          fi

  marketplace:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: actions/download-artifact@v4
        with:
          name: vsix

      - name: Resolve VSIX package
        id: vsix
        run: |
          set -euo pipefail
          shopt -s nullglob
          vsix=( *.vsix )
          if [ ${#vsix[@]} -ne 1 ]; then
            echo "Expected exactly one VSIX package, found ${#vsix[@]}"
            printf '%s\n' "${vsix[@]}"
            exit 1
          fi
          echo "path=${vsix[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish to Visual Studio Marketplace (retry)
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          max_attempts=4
          retry_wait_seconds=90
          for attempt in $(seq 1 "$max_attempts"); do
            echo "Marketplace publish attempt ${attempt}/${max_attempts}"
            if npx vsce publish --packagePath "${{ steps.vsix.outputs.path }}" --skip-duplicate --allow-proposed-apis timeline; then
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Publish failed; waiting ${retry_wait_seconds}s before retry..."
              sleep "$retry_wait_seconds"
            fi
          done
          echo "Marketplace publish failed after ${max_attempts} attempts"
          exit 1
